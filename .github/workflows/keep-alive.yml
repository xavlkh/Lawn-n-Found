name: Keep Render Service Alive

on:
  schedule:
    # Runs every 10 minutes to prevent Render free tier from spinning down
    # Render spins down after 15 mins of inactivity, so 10 min keeps it alive
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          echo "Pinging Render service to keep it alive..."
          curl -f https://lawn-n-found.onrender.com/ || echo "Ping failed, but that's okay - Render might take a moment to wake up"
